<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATC24 Flight Plan Generator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      overflow-y: auto;
    }

    #app {
      width: 100%;
      max-width: 680px;
      padding: 2rem 1rem;
      display: none;
      overflow-y: auto;
    }

    h1 {
      font-size: 1.5rem;
      color: #58a6ff;
      margin-bottom: 1.5rem;
      letter-spacing: 0.03em;
    }

    #flight-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b949e;
    }

    input, select {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 0.5rem 0.75rem;
      font-size: 0.95rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      border-color: #58a6ff;
    }

    select:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #output-section {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem;
    }

    #output-section label {
      display: block;
      margin-bottom: 0.5rem;
    }

    #command-output {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.9rem;
      color: #3fb950;
      word-break: break-all;
      margin-bottom: 0.75rem;
      min-height: 1.4em;
    }

    #copy-btn {
      background-color: #238636;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 0.45rem 1.1rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background-color 0.15s;
    }

    #copy-btn:hover {
      background-color: #2ea043;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
    }

    #reset-btn {
      background-color: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.45rem 1.1rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background-color 0.15s;
    }

    #reset-btn:hover {
      background-color: #da3633;
      border-color: #da3633;
    }

    #vspeed-section {
      margin-top: 1.5rem;
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem;
    }

    #vspeed-section h2 {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #8b949e;
      margin-bottom: 1rem;
    }

    #vspeed-runway-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    #vspeed-display {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .vspeed-col {
      background-color: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.75rem;
    }

    .vspeed-header {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #58a6ff;
      margin-bottom: 0.6rem;
    }

    .vspeed-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 0;
      border-bottom: 1px solid #21262d;
    }

    .vspeed-row:last-child {
      border-bottom: none;
    }

    .vspeed-name {
      font-size: 0.85rem;
      color: #8b949e;
      font-weight: 600;
    }

    .vspeed-val {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.95rem;
      color: #3fb950;
    }

    .vspeed-val.na {
      color: #8b949e;
    }

    #vspeed-note {
      font-size: 0.75rem;
      color: #8b949e;
      margin-top: 0.75rem;
    }

    #bar {
      width: 100%;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 1rem;
      background-color: #161b22;
      border-bottom: 2px solid #30363d;
      flex-shrink: 0;
      user-select: none;
    }

    #bar-phase-toggle {
      display: flex;
      gap: 0.25rem;
      flex-shrink: 0;
    }

    .phase-btn {
      background: none;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .phase-btn.active {
      background-color: #1f6feb;
      border-color: #1f6feb;
      color: #ffffff;
    }

    .phase-btn:hover:not(.active) {
      border-color: #58a6ff;
      color: #58a6ff;
    }

    #bar-aircraft {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e6edf3;
      min-width: 80px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #bar-vspeeds {
      display: flex;
      gap: 1.5rem;
      flex: 1;
    }

    .bar-vspeed {
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
    }

    .bar-vname {
      font-size: 0.7rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      min-width: 2.2rem;
    }

    .bar-vval {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.95rem;
      color: #3fb950;
    }

    #bar-expand-btn {
      background: none;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      font-size: 0.85rem;
      padding: 0.2rem 0.6rem;
      cursor: pointer;
      flex-shrink: 0;
      margin-left: auto;
      transition: all 0.15s;
    }

    #bar-expand-btn:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }

    @media (max-width: 500px) {
      #flight-form,
      #vspeed-runway-inputs,
      #vspeed-display {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="bar">
    <div id="bar-phase-toggle">
      <button class="phase-btn active" id="phase-takeoff">🛫 TAKEOFF</button>
      <button class="phase-btn" id="phase-landing">🛬 LANDING</button>
    </div>
    <div id="bar-aircraft">— No aircraft —</div>
    <div id="bar-vspeeds">
      <span class="bar-vspeed"><span class="bar-vname" id="bar-name1">V1</span><span class="bar-vval" id="bar-val1">—</span></span>
      <span class="bar-vspeed"><span class="bar-vname" id="bar-name2">VR</span><span class="bar-vval" id="bar-val2">—</span></span>
      <span class="bar-vspeed"><span class="bar-vname" id="bar-name3">V2</span><span class="bar-vval" id="bar-val3">—</span></span>
    </div>
    <button id="bar-expand-btn">▼</button>
  </div>
  <div id="app">
    <h1>ATC24 Flight Plan Generator</h1>
    <form id="flight-form">
      <div class="field-group">
        <label for="ingame-callsign">In-Game Callsign</label>
        <input type="text" id="ingame-callsign" placeholder="e.g. Striker 9212" />
      </div>

      <div class="field-group">
        <label for="callsign">Callsign</label>
        <input type="text" id="callsign" placeholder="e.g. VIR92" />
      </div>

      <div class="field-group">
        <label for="aircraft">Aircraft</label>
        <input type="text" id="aircraft" placeholder="e.g. A350" list="aircraft-list" autocomplete="off" />
        <datalist id="aircraft-list"></datalist>
      </div>

      <div class="field-group">
        <label for="flight-rules">Flight Rules</label>
        <select id="flight-rules">
          <option value="">-- Select --</option>
          <option value="IFR">IFR</option>
          <option value="VFR">VFR</option>
        </select>
      </div>

      <div class="field-group">
        <label for="dep-region">Departing Region</label>
        <select id="dep-region">
          <option value="">-- Select Region --</option>
        </select>
      </div>

      <div class="field-group">
        <label for="dep-airport">Departing Airport</label>
        <select id="dep-airport" disabled>
          <option value="">-- Select Airport --</option>
        </select>
      </div>

      <div class="field-group">
        <label for="arr-region">Arriving Region</label>
        <select id="arr-region">
          <option value="">-- Select Region --</option>
        </select>
      </div>

      <div class="field-group">
        <label for="arr-airport">Arriving Airport</label>
        <select id="arr-airport" disabled>
          <option value="">-- Select Airport --</option>
        </select>
      </div>

      <div class="field-group">
        <label for="flight-level">Flight Level</label>
        <input type="number" id="flight-level" placeholder="e.g. 100" min="0" />
      </div>

      <div class="field-group">
        <label for="route">Route</label>
        <input type="text" id="route" placeholder="e.g. RDV" />
      </div>
    </form>
    <div id="output-section">
      <label>Generated Command</label>
      <div id="command-output"></div>
      <div class="btn-row">
        <button type="button" id="copy-btn">Copy</button>
        <button type="button" id="reset-btn">Reset</button>
      </div>
    </div>
    <div id="vspeed-section">
      <h2>V-Speed Calculator</h2>
      <div id="vspeed-runway-inputs">
        <div class="field-group">
          <label for="dep-runway">Departure Runway</label>
          <input type="text" id="dep-runway" placeholder="e.g. 27L" />
        </div>
        <div class="field-group">
          <label for="arr-runway">Arrival Runway</label>
          <input type="text" id="arr-runway" placeholder="e.g. 09R" />
        </div>
      </div>
      <div id="vspeed-display">
        <div class="vspeed-col">
          <div class="vspeed-header">TAKEOFF <span id="dep-runway-label"></span></div>
          <div class="vspeed-row"><span class="vspeed-name">V1</span><span class="vspeed-val" id="v1-val">—</span></div>
          <div class="vspeed-row"><span class="vspeed-name">VR</span><span class="vspeed-val" id="vr-val">—</span></div>
          <div class="vspeed-row"><span class="vspeed-name">V2</span><span class="vspeed-val" id="v2-val">—</span></div>
        </div>
        <div class="vspeed-col">
          <div class="vspeed-header">LANDING <span id="arr-runway-label"></span></div>
          <div class="vspeed-row"><span class="vspeed-name">Vapp</span><span class="vspeed-val" id="vapp-val">—</span></div>
          <div class="vspeed-row"><span class="vspeed-name">Vref</span><span class="vspeed-val" id="vref-val">—</span></div>
        </div>
      </div>
      <p id="vspeed-note"></p>
    </div>
  </div>
  <script>
    const AIRPORTS = {
      "Cyprus": [
        { name: "Barra Airport", icao: "IBAR" },
        { name: "Henstridge Airfield", icao: "IHEN" },
        { name: "Larnaca Intl.", icao: "ILAR" },
        { name: "Paphos Intl.", icao: "IPAP" },
      ],
      "Grindavik": [
        { name: "Keflavik Intl.", icao: "IKFL" },
        { name: "Pingeyri Airport", icao: "ITEY" },
      ],
      "Izolirani": [
        { name: "Al Najaf", icao: "IJAF" },
        { name: "Izolirani Intl.", icao: "IZOL" },
      ],
      "Orenji": [
        { name: "Bird Island Airfield", icao: "IBRD" },
        { name: "Saba Airport", icao: "IDCS" },
        { name: "Tokyo Intl.", icao: "ITKO" },
      ],
      "Perth": [
        { name: "Lukla Airport", icao: "ILKL" },
        { name: "Perth Intl.", icao: "IPPH" },
      ],
      "Rockford": [
        { name: "Boltic Airfield", icao: "IBLT" },
        { name: "Greater Rockford", icao: "IRFD" },
        { name: "Mellor Intl.", icao: "IMLR" },
        { name: "Training Centre", icao: "ITRC" },
      ],
      "Saint Barthelemy": [
        { name: "Saint Barthelemy", icao: "IBTH" },
        { name: "Skopelos Airfield", icao: "ISKP" },
      ],
      "Sauthamptona": [
        { name: "Sauthamptona Airport", icao: "ISAU" },
      ],
      "Airbases": [
        { name: "McConnell AFB", icao: "IIAB" },
        { name: "Air Base Garry", icao: "IGAR" },
        { name: "RAF Scampton", icao: "ISCM" },
      ],
    };

    const AIRCRAFT = [
      // Airbus airliners
      { name: "A220",      airliner: true },
      { name: "A320",      airliner: true },
      { name: "A330",      airliner: true },
      { name: "A340",      airliner: true },
      { name: "A350",      airliner: true },
      { name: "A380",      airliner: true },
      { name: "BelugaXL",  airliner: true },
      // Boeing airliners
      { name: "B707",      airliner: true },
      { name: "B727",      airliner: true },
      { name: "B737",      airliner: true },
      { name: "B747",      airliner: true },
      { name: "B757",      airliner: true },
      { name: "B767",      airliner: true },
      { name: "B777",      airliner: true },
      { name: "B787",      airliner: true },
      // Regional airliners
      { name: "ATR-72",    airliner: true },
      { name: "CRJ700",    airliner: true },
      { name: "Q400",      airliner: true },
      // Classic widebodies
      { name: "L-1011",    airliner: true },
      { name: "DC-10",     airliner: true },
      { name: "MD-11",     airliner: true },
      { name: "MD-90",     airliner: true },
      // Antonov / misc
      { name: "An-22",     airliner: true },
      { name: "An-225",    airliner: true },
      { name: "Comet",     airliner: true },
    ];

    function populateRegions(selectEl) {
      Object.keys(AIRPORTS).forEach(region => {
        const opt = document.createElement("option");
        opt.value = region;
        opt.textContent = region;
        selectEl.appendChild(opt);
      });
    }

    function populateAirports(regionSelectEl, airportSelectEl) {
      const region = regionSelectEl.value;
      airportSelectEl.innerHTML = '<option value="">-- Select Airport --</option>';
      if (!region) {
        airportSelectEl.disabled = true;
        if (typeof updateCommand === "function") updateCommand();
        return;
      }
      if (!AIRPORTS[region]) {
        airportSelectEl.disabled = true;
        if (typeof updateCommand === "function") updateCommand();
        return;
      }
      AIRPORTS[region].forEach(airport => {
        const opt = document.createElement("option");
        opt.value = airport.icao;
        opt.textContent = `${airport.name} (${airport.icao})`;
        airportSelectEl.appendChild(opt);
      });
      airportSelectEl.disabled = false;
      if (typeof updateCommand === "function") updateCommand();
    }

    const depRegionEl = document.getElementById("dep-region");
    const depAirportEl = document.getElementById("dep-airport");
    const arrRegionEl = document.getElementById("arr-region");
    const arrAirportEl = document.getElementById("arr-airport");

    populateRegions(depRegionEl);
    populateRegions(arrRegionEl);

    depRegionEl.addEventListener("change", () => populateAirports(depRegionEl, depAirportEl));
    arrRegionEl.addEventListener("change", () => populateAirports(arrRegionEl, arrAirportEl));

    const ingameCallsignEl = document.getElementById("ingame-callsign");
    const callsignEl = document.getElementById("callsign");
    const aircraftEl = document.getElementById("aircraft");
    const flightRulesEl = document.getElementById("flight-rules");
    const flightLevelEl = document.getElementById("flight-level");
    const routeEl = document.getElementById("route");
    const commandOutputEl = document.getElementById("command-output");

    function buildCommand() {
      const ingameCallsign = ingameCallsignEl.value;
      const callsign = callsignEl.value;
      const aircraft = aircraftEl.value;
      const flightRules = flightRulesEl.value;
      const departing = depAirportEl.value;
      const arriving = arrAirportEl.value;
      const flightLevel = flightLevelEl.value;
      const route = routeEl.value;

      return `/createflightplan ingamecallsign:${ingameCallsign} callsign:${callsign} aircraft:${aircraft} flightrules:${flightRules} departing:${departing} arriving:${arriving} flightlevel:${flightLevel} route:${route}`;
    }

    function updateCommand() {
      const ingameCallsign = ingameCallsignEl.value.trim();
      const callsign = callsignEl.value.trim();
      const aircraft = aircraftEl.value.trim();
      const flightRules = flightRulesEl.value;
      const departing = depAirportEl.value;
      const arriving = arrAirportEl.value;
      const flightLevel = flightLevelEl.value.trim();
      const route = routeEl.value.trim();

      const allFilled = ingameCallsign && callsign && aircraft && flightRules && departing && arriving && flightLevel && route;

      if (!allFilled) {
        commandOutputEl.textContent = "Fill in all fields to generate the command.";
        commandOutputEl.style.color = "#8b949e";
      } else {
        commandOutputEl.textContent = buildCommand();
        commandOutputEl.style.color = "#3fb950";
      }
    }

    [ingameCallsignEl, callsignEl, aircraftEl, flightRulesEl,
     depAirportEl, arrAirportEl, flightLevelEl, routeEl
    ].forEach(el => el.addEventListener("input", updateCommand));

    [depAirportEl, arrAirportEl, flightRulesEl
    ].forEach(el => el.addEventListener("change", updateCommand));

    updateCommand();

    // Populate aircraft datalist
    const aircraftListEl = document.getElementById("aircraft-list");
    AIRCRAFT.forEach(ac => {
      const opt = document.createElement("option");
      opt.value = ac.name;
      aircraftListEl.appendChild(opt);
    });

    function isAirliner(value) {
      return AIRCRAFT.some(ac => ac.airliner && ac.name.toLowerCase() === value.trim().toLowerCase());
    }

    function updateFlightRulesForAircraft() {
      const vfrOption = flightRulesEl.querySelector('option[value="VFR"]');
      if (isAirliner(aircraftEl.value)) {
        flightRulesEl.value = "IFR";
        vfrOption.disabled = true;
      } else {
        vfrOption.disabled = false;
      }
      updateCommand();
    }

    aircraftEl.addEventListener("input", updateFlightRulesForAircraft);
    aircraftEl.addEventListener("change", updateFlightRulesForAircraft);

    // V-Speed data (kts). Formulas from cityusergh.github.io/ptfsperf:
    //   VR = rotate speed, V2 = VR+4, Vref = ceil(stall*1.3), Vapp = Vref+5
    //   V1 ≈ VR-10 (runway-dependent in full calc; this is a typical approximation)
    // (*) = derived from ptfsperf data   (~) = estimated
    const V_SPEEDS = {
      "A220":     { v1: 137, vr: 147, v2: 151, vref: 137, vapp: 142 }, // *
      "A320":     { v1: 149, vr: 159, v2: 163, vref: 143, vapp: 148 }, // *
      "A330":     { v1: 149, vr: 159, v2: 163, vref: 143, vapp: 148 }, // *
      "A340":     { v1: 149, vr: 159, v2: 163, vref: 143, vapp: 148 }, // ~ (based on A330)
      "A350":     { v1: 159, vr: 169, v2: 173, vref: 153, vapp: 158 }, // *
      "A380":     { v1: 160, vr: 170, v2: 174, vref: 153, vapp: 158 }, // *
      "BelugaXL": { v1: 159, vr: 169, v2: 173, vref: 153, vapp: 158 }, // ~ (based on A350)
      "B707":     { v1: 141, vr: 151, v2: 155, vref: 143, vapp: 148 }, // ~ (based on B747)
      "B727":     { v1: 142, vr: 152, v2: 156, vref: 143, vapp: 148 }, // ~ (based on B737)
      "B737":     { v1: 142, vr: 152, v2: 156, vref: 143, vapp: 148 }, // *
      "B747":     { v1: 141, vr: 151, v2: 155, vref: 143, vapp: 148 }, // *
      "B757":     { v1: 142, vr: 152, v2: 156, vref: 143, vapp: 148 }, // ~ (based on B737)
      "B767":     { v1: 149, vr: 159, v2: 163, vref: 143, vapp: 148 }, // ~ (based on B737/A320)
      "B777":     { v1: 152, vr: 162, v2: 166, vref: 156, vapp: 161 }, // *
      "B787":     { v1: 152, vr: 162, v2: 166, vref: 156, vapp: 161 }, // *
      "ATR-72":   { v1: 127, vr: 137, v2: 141, vref: 150, vapp: 155 }, // *
      "CRJ700":   { v1: 126, vr: 136, v2: 140, vref: 137, vapp: 142 }, // ~ (based on E190)
      "Q400":     { v1: 127, vr: 137, v2: 141, vref: 150, vapp: 155 }, // ~ (based on ATR-72)
      "L-1011":   { v1: 152, vr: 162, v2: 166, vref: 156, vapp: 161 }, // ~ (based on B777)
      "DC-10":    { v1: 152, vr: 162, v2: 166, vref: 156, vapp: 161 }, // ~ (based on B777)
      "MD-11":    { v1: 152, vr: 162, v2: 166, vref: 156, vapp: 161 }, // ~ (based on B777)
      "MD-90":    { v1: 142, vr: 152, v2: 156, vref: 143, vapp: 148 }, // ~ (based on B737)
      "An-22":    { v1: 160, vr: 170, v2: 174, vref: 153, vapp: 158 }, // ~ (based on A380)
      "An-225":   { v1: 170, vr: 180, v2: 184, vref: 163, vapp: 168 }, // ~
      "Comet":    { v1: 141, vr: 151, v2: 155, vref: 143, vapp: 148 }, // ~
    };

    const depRunwayEl  = document.getElementById("dep-runway");
    const arrRunwayEl  = document.getElementById("arr-runway");
    const vspeedNoteEl = document.getElementById("vspeed-note");

    function updateVSpeeds() {
      const aircraft = aircraftEl.value.trim();
      const speeds = Object.entries(V_SPEEDS).find(
        ([k]) => k.toLowerCase() === aircraft.toLowerCase()
      )?.[1];

      const depRwy = depRunwayEl.value.trim();
      const arrRwy = arrRunwayEl.value.trim();

      document.getElementById("dep-runway-label").textContent = depRwy ? `— RWY ${depRwy}` : "";
      document.getElementById("arr-runway-label").textContent = arrRwy ? `— RWY ${arrRwy}` : "";

      const ids = ["v1-val", "vr-val", "v2-val", "vapp-val", "vref-val"];

      if (speeds) {
        const values = [speeds.v1, speeds.vr, speeds.v2, speeds.vapp, speeds.vref];
        ids.forEach((id, i) => {
          const el = document.getElementById(id);
          el.textContent = `${values[i]} kts`;
          el.classList.remove("na");
        });
        const isEstimated = !["A220","A320","A330","A350","A380","B737","B747","B777","B787","ATR-72"].some(
          a => a.toLowerCase() === aircraft.toLowerCase()
        );
        vspeedNoteEl.textContent = isEstimated
          ? "~ Estimated values (aircraft not in ptfsperf dataset)."
          : "* Data sourced from cityusergh.github.io/ptfsperf — V1 uses typical runway approximation.";
      } else {
        ids.forEach(id => {
          const el = document.getElementById(id);
          el.textContent = aircraft ? "N/A" : "—";
          el.classList.toggle("na", !!aircraft);
        });
        vspeedNoteEl.textContent = aircraft ? "No V-speed data for this aircraft type." : "";
      }
    }

    aircraftEl.addEventListener("input", updateVSpeeds);
    aircraftEl.addEventListener("change", updateVSpeeds);
    depRunwayEl.addEventListener("input", updateVSpeeds);
    arrRunwayEl.addEventListener("input", updateVSpeeds);

    updateVSpeeds();

    const copyBtn = document.getElementById("copy-btn");

    copyBtn.addEventListener("click", () => {
      const command = buildCommand();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(command).then(() => {
          copyBtn.textContent = "Copied!";
          setTimeout(() => { copyBtn.textContent = "Copy"; }, 1500);
        }).catch(() => {
          fallbackCopy(command);
        });
      } else {
        fallbackCopy(command);
      }
    });

    const resetBtn = document.getElementById("reset-btn");

    resetBtn.addEventListener("click", () => {
      ingameCallsignEl.value = "";
      callsignEl.value = "";
      aircraftEl.value = "";
      flightRulesEl.value = "";
      flightRulesEl.querySelector('option[value="VFR"]').disabled = false;
      depRegionEl.value = "";
      populateAirports(depRegionEl, depAirportEl);
      arrRegionEl.value = "";
      populateAirports(arrRegionEl, arrAirportEl);
      flightLevelEl.value = "";
      routeEl.value = "";
      depRunwayEl.value = "";
      arrRunwayEl.value = "";
      updateCommand();
      updateVSpeeds();
    });

    function fallbackCopy(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand("copy");
        copyBtn.textContent = "Copied!";
      } catch (e) {
        copyBtn.textContent = "Failed!";
      }
      document.body.removeChild(ta);
      setTimeout(() => { copyBtn.textContent = "Copy"; }, 1500);
    }
  </script>
</body>
</html>
