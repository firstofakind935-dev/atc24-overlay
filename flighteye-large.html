<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #0d1117;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      animation: slideDown 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    #titlebar {
      height: 34px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      flex-shrink: 0;
      -webkit-app-region: drag;
      user-select: none;
    }

    #titlebar-label {
      color: #58a6ff;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #titlebar-label span {
      color: #8b949e;
      font-weight: 400;
      margin-left: 6px;
      font-size: 0.7rem;
      letter-spacing: 0.03em;
      text-transform: none;
    }

    #titlebar-buttons {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .tb-btn {
      background: none;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 8px;
      height: 24px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .tb-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    #close-btn:hover { background: #da3633; border-color: #da3633; color: #fff; }

    #tabbar {
      display: flex;
      background: #0d1117;
      border-bottom: 1px solid #30363d;
      padding: 0 12px;
      gap: 4px;
      flex-shrink: 0;
    }

    .tab {
      padding: 7px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #8b949e;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      letter-spacing: 0.04em;
      user-select: none;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab:hover { color: #e6edf3; }

    .tab.active       { color: #58a6ff; border-bottom-color: #58a6ff; }
    .tab.active.tcas  { color: #3fb950; border-bottom-color: #3fb950; }

    #webview-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #webview-container webview {
      flex: 1;
      width: 100%;
      min-height: 0;
      border: none;
    }
  </style>
</head>
<body>
  <div id="titlebar">
    <span id="titlebar-label">👁 Flight Eye <span>— Large View · drag to move · resize from corner</span></span>
    <div id="titlebar-buttons">
      <button class="tb-btn" id="min-btn" title="Minimise">—</button>
      <button class="tb-btn" id="close-btn" title="Close large view">✕ Close</button>
    </div>
  </div>

  <div id="tabbar">
    <div class="tab active" id="tab-fe" data-target="fe-webview">🗺 Flight Eye</div>
    <div class="tab tcas"   id="tab-tc" data-target="tc-webview">🛡 TCAS — 24 Pilot</div>
  </div>

  <div id="webview-container">
    <webview id="fe-webview" src="https://flighteye.org/flighteye/map" allowpopups></webview>
    <webview id="tc-webview" src="https://24pilot.ptfsrp.com/" allowpopups style="display:none"></webview>
  </div>

  <script>
    document.getElementById('min-btn').addEventListener('click', () => {
      window.minimize();
    });
    document.getElementById('close-btn').addEventListener('click', () => {
      window.close();
    });

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const targetId = tab.dataset.target;

        // Deactivate all tabs
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // Show target webview, hide others
        document.querySelectorAll('#webview-container webview').forEach(wv => {
          wv.style.display = wv.id === targetId ? 'block' : 'none';
        });
      });
    });
  </script>
</body>
</html>
