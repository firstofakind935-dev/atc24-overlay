<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #0d1117;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      animation: slideDown 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    #titlebar {
      height: 34px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      flex-shrink: 0;
      -webkit-app-region: drag;
      user-select: none;
    }

    #titlebar-label {
      color: #58a6ff;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #titlebar-label span {
      color: #8b949e;
      font-weight: 400;
      margin-left: 6px;
      font-size: 0.7rem;
      letter-spacing: 0.03em;
      text-transform: none;
    }

    #titlebar-buttons {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .tb-btn {
      background: none;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 8px;
      height: 24px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .tb-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    #close-btn:hover { background: #da3633; border-color: #da3633; color: #fff; }

    webview {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="titlebar">
    <span id="titlebar-label">👁 Flight Eye <span>— Large View · drag to move · resize from corner</span></span>
    <div id="titlebar-buttons">
      <button class="tb-btn" id="min-btn" title="Minimise">—</button>
      <button class="tb-btn" id="close-btn" title="Close large view">✕ Close</button>
    </div>
  </div>

  <webview src="https://flighteye.org/flighteye/map" allowpopups></webview>

  <script>
    document.getElementById('min-btn').addEventListener('click', () => {
      window.minimize();
    });
    document.getElementById('close-btn').addEventListener('click', () => {
      window.close();
    });
  </script>
</body>
</html>
