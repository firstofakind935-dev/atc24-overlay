name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx @electron/packager . "ATC24 Overlay" --platform=win32 --arch=x64 --out=dist --overwrite --ignore="dist|\.git|docs"
        shell: bash
      - name: Zip Windows build
        run: Compress-Archive -Path "dist/ATC24 Overlay-win32-x64" -DestinationPath "ATC24-Overlay-Windows.zip"
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ATC24-Overlay-Windows.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx @electron/packager . "ATC24 Overlay" --platform=darwin --arch=universal --out=dist --overwrite --ignore="dist|\.git|docs"
      - name: Zip Mac Universal build
        run: zip -r ATC24-Overlay-Mac.zip "dist/ATC24 Overlay-darwin-universal"
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: ATC24-Overlay-Mac.zip

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'v1.1.0' }}
          name: ATC24 Overlay ${{ github.ref_name || 'v1.1.0' }}
          body: |
            ## Download
            | Platform | File |
            |---|---|
            | Windows | `ATC24-Overlay-Windows.zip` |
            | Mac (Intel + Apple Silicon) | `ATC24-Overlay-Mac.zip` |

            Extract the zip and run the app inside.

            > **Mac users:** Right-click the app → Open the first time to bypass Gatekeeper.
          files: |
            ATC24-Overlay-Windows.zip
            ATC24-Overlay-Mac.zip
