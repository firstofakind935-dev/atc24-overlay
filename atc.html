<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes stripIn   { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #0d1117;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e6edf3;
      animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Title bar */
    #titlebar {
      height: 34px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      flex-shrink: 0;
      -webkit-app-region: drag;
      user-select: none;
    }
    #titlebar-label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #d2a8ff; }
    #titlebar-label span { color: #8b949e; font-weight: 400; margin-left: 6px; font-size: 0.7rem; text-transform: none; letter-spacing: 0.03em; }
    #titlebar-right { display: flex; gap: 6px; -webkit-app-region: no-drag; }
    .tb-btn {
      background: none; border: 1px solid #30363d; border-radius: 4px; color: #8b949e;
      cursor: pointer; font-size: 11px; padding: 2px 7px; height: 22px;
      display: flex; align-items: center; transition: all 0.15s; white-space: nowrap;
    }
    .tb-btn:hover    { border-color: #d2a8ff; color: #d2a8ff; }
    #close-btn:hover { background: #da3633; border-color: #da3633; color: #fff; }

    /* Config strip */
    #config {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 8px 12px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(78px, 1fr));
      gap: 8px;
      flex-shrink: 0;
    }
    .cfg-field { display: flex; flex-direction: column; gap: 3px; }
    .cfg-field label { font-size: 0.56rem; letter-spacing: 0.08em; text-transform: uppercase; color: #8b949e; }
    .cfg-field input, .cfg-field select {
      background: #0d1117; border: 1px solid #30363d; border-radius: 5px; color: #e6edf3;
      padding: 4px 6px; font-size: 0.78rem; outline: none; width: 100%;
    }
    .cfg-field input:focus, .cfg-field select:focus { border-color: #d2a8ff; }
    #atis-row {
      grid-column: 1 / -1;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #atis-btn {
      background: #6e40c9; border: none; border-radius: 5px; color: #fff;
      padding: 5px 12px; font-size: 0.74rem; font-weight: 700; cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    #atis-btn:hover { background: #8957e5; }

    /* Add strip form */
    #add-form {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      align-items: center;
    }
    #add-form input {
      background: #0d1117; border: 1px solid #30363d; border-radius: 5px; color: #e6edf3;
      padding: 5px 8px; font-size: 0.8rem; outline: none;
    }
    #add-form input:focus { border-color: #d2a8ff; }
    #add-cs   { width: 90px; }
    #add-type { width: 70px; }
    #add-dep, #add-arr { width: 64px; }
    #add-btn {
      background: #238636; border: none; border-radius: 5px; color: #fff;
      padding: 6px 12px; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    #add-btn:hover { background: #2ea043; }

    /* Strips list */
    #strips {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }
    #strips::-webkit-scrollbar { width: 5px; }
    #strips::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    #strips-empty { color: #8b949e; font-size: 0.82rem; text-align: center; margin-top: 30px; line-height: 1.6; }

    .strip {
      background: #161b22;
      border: 1px solid #30363d;
      border-left: 3px solid #d2a8ff;
      border-radius: 7px;
      padding: 9px 10px;
      animation: stripIn 0.2s ease both;
    }
    .strip-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .strip-cs  { font-size: 0.95rem; font-weight: 800; color: #e6edf3; letter-spacing: 0.04em; }
    .strip-type { font-size: 0.7rem; color: #8b949e; margin-left: 6px; font-weight: 500; }
    .strip-badge {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 12px; border: 1px solid #30363d; color: #8b949e; white-space: nowrap;
    }
    .strip-badge.active { border-color: #d2a8ff; color: #d2a8ff; }
    .strip-badge.done   { border-color: #3fb950; color: #3fb950; }
    .strip-rm {
      background: none; border: none; color: #8b949e; cursor: pointer; font-size: 13px; padding: 0 2px; transition: color 0.15s;
    }
    .strip-rm:hover { color: #da3633; }

    .strip-meta { font-size: 0.72rem; color: #8b949e; margin: 4px 0 8px; font-family: 'Consolas', monospace; }
    .strip-meta b { color: #58a6ff; }
    .strip-sq { color: #e3b341; }

    .strip-actions { display: flex; gap: 6px; }
    .strip-actions select {
      flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 5px; color: #e6edf3;
      padding: 4px 6px; font-size: 0.74rem; outline: none;
    }
    .strip-actions select:focus { border-color: #d2a8ff; }
    .strip-actions .strip-rwy { flex: 0 0 96px; }
    .strip-tx {
      background: #1f6feb; border: none; border-radius: 5px; color: #fff;
      padding: 4px 12px; font-size: 0.74rem; font-weight: 700; cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .strip-tx:hover { background: #388bfd; }

    /* Transmission log */
    #log {
      flex-shrink: 0;
      border-top: 1px solid #30363d;
      background: #0d1117;
      max-height: 130px;
      overflow-y: auto;
      padding: 8px 12px;
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }
    #log::-webkit-scrollbar { width: 5px; }
    #log::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    #log-title {
      font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: #8b949e;
      margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;
    }
    #log-clear { background: none; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; cursor: pointer; font-size: 0.6rem; padding: 1px 7px; }
    #log-clear:hover { border-color: #da3633; color: #da3633; }
    .log-line { font-size: 0.76rem; line-height: 1.5; color: #c9d1d9; font-family: 'Consolas', monospace; padding: 2px 0; border-bottom: 1px solid #161b22; }
    .log-line:last-child { border-bottom: none; }
    .log-line .lt { color: #6e7681; margin-right: 6px; }
    .log-line.atis { color: #d2a8ff; }
    .log-empty { color: #6e7681; font-size: 0.72rem; font-style: italic; }

    /* Shell: side launcher rail + main area */
    #shell { flex: 1; display: flex; min-height: 0; }
    #rail {
      width: 62px; flex-shrink: 0;
      background: #0b0e13; border-right: 1px solid #30363d;
      display: flex; flex-direction: column; padding: 8px 0; gap: 2px;
    }
    .rail-btn {
      background: none; border: none; color: #8b949e; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 9px 0; font-size: 17px; border-left: 2px solid transparent; transition: all 0.15s;
    }
    .rail-btn span { font-size: 0.52rem; letter-spacing: 0.04em; text-transform: uppercase; }
    .rail-btn:hover { color: #e6edf3; }
    .rail-btn.active { color: #d2a8ff; border-left-color: #d2a8ff; background: #161b22; }

    #main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .view { display: none; flex: 1; min-height: 0; }
    .view.active { display: flex; flex-direction: column; }

    /* Weather view */
    #wx-head {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      border-bottom: 1px solid #30363d; flex-shrink: 0;
    }
    #wx-head h2 { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #d2a8ff; }
    #wx-filter {
      background: #0d1117; border: 1px solid #30363d; border-radius: 5px; color: #e6edf3;
      padding: 4px 8px; font-size: 0.74rem; outline: none; width: 96px;
    }
    #wx-filter:focus { border-color: #d2a8ff; }
    #wx-refresh {
      background: #6e40c9; border: none; border-radius: 5px; color: #fff;
      padding: 4px 12px; font-size: 0.72rem; font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    #wx-refresh:hover { background: #8957e5; }
    #wx-updated { font-size: 0.64rem; color: #8b949e; margin-left: auto; white-space: nowrap; }

    #wx-list {
      flex: 1; overflow-y: auto; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 7px;
      scrollbar-width: thin; scrollbar-color: #30363d transparent;
    }
    #wx-list::-webkit-scrollbar { width: 5px; }
    #wx-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .wx-empty { color: #8b949e; font-size: 0.8rem; text-align: center; margin-top: 24px; line-height: 1.6; }
    .wx-card { background: #161b22; border: 1px solid #30363d; border-radius: 7px; padding: 8px 10px; }
    .wx-top { display: flex; align-items: center; justify-content: space-between; }
    .wx-icao { font-size: 0.95rem; font-weight: 800; color: #e6edf3; letter-spacing: 0.05em; }
    .wx-info { font-size: 0.6rem; font-weight: 700; color: #d2a8ff; border: 1px solid #d2a8ff; border-radius: 12px; padding: 1px 8px; }
    .wx-meta { font-size: 0.72rem; color: #c9d1d9; font-family: 'Consolas', monospace; margin: 5px 0 7px; }
    .wx-use {
      background: none; border: 1px solid #30363d; border-radius: 5px; color: #8b949e;
      padding: 4px 10px; font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .wx-use:hover { border-color: #3fb950; color: #3fb950; }

    #on-list {
      flex: 1; overflow-y: auto; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: thin; scrollbar-color: #30363d transparent;
    }
    #on-list::-webkit-scrollbar { width: 5px; }
    #on-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    .on-group { font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: #8b949e; margin: 8px 0 2px; }
    .on-card {
      display: flex; align-items: center; gap: 10px;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 7px 10px;
    }
    .on-pos { font-size: 0.62rem; font-weight: 800; border-radius: 5px; padding: 2px 7px; flex-shrink: 0; }
    .on-pos.CTR { color: #d2a8ff; border: 1px solid #d2a8ff; }
    .on-pos.TWR { color: #58a6ff; border: 1px solid #58a6ff; }
    .on-pos.GND { color: #3fb950; border: 1px solid #3fb950; }
    .on-pos.APP, .on-pos.DEP, .on-pos.DEL { color: #e3b341; border: 1px solid #e3b341; }
    .on-apt  { font-size: 0.9rem; font-weight: 800; color: #e6edf3; letter-spacing: 0.04em; min-width: 48px; }
    .on-freq { font-family: 'Consolas', monospace; font-size: 0.82rem; font-weight: 700; color: #3fb950; min-width: 62px; }
    .on-who  { font-size: 0.74rem; color: #c9d1d9; flex: 1; word-break: break-word; }
    .on-q    { font-size: 0.64rem; color: #8b949e; white-space: nowrap; }
  </style>
</head>
<body>
  <div id="titlebar">
    <span id="titlebar-label">📡 ATC <span>— controller station · drag to move</span></span>
    <div id="titlebar-right">
      <button class="tb-btn" id="min-btn">—</button>
      <button class="tb-btn" id="close-btn">✕</button>
    </div>
  </div>

  <div id="shell">
  <div id="rail">
    <button class="rail-btn active" data-view="station">🎙<span>Station</span></button>
    <button class="rail-btn" data-view="online">📻<span>Online</span></button>
    <button class="rail-btn" data-view="weather">🌦<span>Weather</span></button>
    <button class="rail-btn" id="rail-scope" title="Open Scope in a separate window">🛰<span>Scope</span></button>
  </div>
  <div id="main">

  <div class="view active" id="view-station">
  <div id="config">
    <div class="cfg-field">
      <label for="cfg-pos">Position</label>
      <select id="cfg-pos">
        <option value="Ground">Ground</option>
        <option value="Tower" selected>Tower</option>
        <option value="Center">Center</option>
      </select>
    </div>
    <div class="cfg-field">
      <label for="cfg-apt">Airport</label>
      <input type="text" id="cfg-apt" placeholder="IRFD" />
    </div>
    <div class="cfg-field">
      <label for="cfg-deprwy">DEP RWY</label>
      <input type="text" id="cfg-deprwy" placeholder="27L 27R" />
    </div>
    <div class="cfg-field">
      <label for="cfg-arrrwy">ARR RWY</label>
      <input type="text" id="cfg-arrrwy" placeholder="27L 27R" />
    </div>
    <div class="cfg-field">
      <label for="cfg-wind">Wind</label>
      <input type="text" id="cfg-wind" placeholder="270/08" />
    </div>
    <div class="cfg-field">
      <label for="cfg-qnh">QNH</label>
      <input type="text" id="cfg-qnh" placeholder="1013" />
    </div>
    <div class="cfg-field">
      <label for="cfg-atis">ATIS</label>
      <input type="text" id="cfg-atis" placeholder="A" maxlength="1" />
    </div>
    <div id="atis-row">
      <button id="atis-btn">📢 Broadcast ATIS</button>
      <span id="cfg-freq" style="font-size:0.78rem;color:#3fb950;font-family:'Consolas',monospace;font-weight:700;margin-left:auto"></span>
    </div>
  </div>

  <form id="add-form" autocomplete="off">
    <input type="text" id="add-cs"   placeholder="Callsign" />
    <input type="text" id="add-type" placeholder="Type" />
    <input type="text" id="add-dep"  placeholder="From" />
    <input type="text" id="add-arr"  placeholder="To" />
    <button type="submit" id="add-btn">+ Add Strip</button>
  </form>

  <div id="strips">
    <div id="strips-empty">No active aircraft.<br>Add a strip above for each aircraft you're working.</div>
  </div>

  <div id="log">
    <div id="log-title"><span>Transmission Log</span><button id="log-clear">Clear</button></div>
    <div id="log-body"><div class="log-empty">Instructions you issue will appear here.</div></div>
  </div>
  </div><!-- /view-station -->

  <div class="view" id="view-weather">
    <div id="wx-head">
      <h2>Live ATIS</h2>
      <input type="text" id="wx-filter" placeholder="Filter ICAO" />
      <button id="wx-refresh">↻ Refresh</button>
      <span id="wx-updated"></span>
    </div>
    <div id="wx-list"><div class="wx-empty">Open to load live ATIS…</div></div>
  </div>

  <div class="view" id="view-online">
    <div id="wx-head">
      <h2>Online ATC</h2>
      <input type="text" id="on-filter" placeholder="Filter ICAO" />
      <button id="on-refresh">↻ Refresh</button>
      <span id="on-updated"></span>
    </div>
    <div id="on-list"><div class="wx-empty">Open to load active positions…</div></div>
  </div>

  </div><!-- /main -->
  </div><!-- /shell -->

  <script>
    // ── Instruction templates (controller → pilot) ──────────────────────────
    // pos = positions that may issue this · rwy = which active runway it uses ('dep'/'arr')
    const INSTRUCTIONS = [
      { id: 'clearance', label: 'IFR Clearance',   status: 'Cleared',   pos: ['Ground'],           rwy: null,  build: (cs, s, c) => `${cs}, cleared to ${s.arr || 'destination'} as filed, squawk ${s.squawk}.` },
      { id: 'startup',   label: 'Startup',         status: 'Startup',   pos: ['Ground'],           rwy: null,  build: (cs, s, c) => `${cs}, startup approved, information ${c.atis || 'current'}, QNH ${c.qnh || 'standard'}.` },
      { id: 'pushback',  label: 'Pushback',        status: 'Pushback',  pos: ['Ground'],           rwy: null,  build: (cs, s, c) => `${cs}, pushback approved.` },
      { id: 'taxi',      label: 'Taxi to RWY',     status: 'Taxiing',   pos: ['Ground'],           rwy: 'dep', build: (cs, s, c) => `${cs}, taxi to holding point runway ${c.depRwy || 'in use'}, QNH ${c.qnh || 'standard'}.` },
      { id: 'taxiGate',  label: 'Taxi to Stand',   status: 'Arrived',   pos: ['Ground'],           rwy: null,  build: (cs, s, c) => `${cs}, taxi to stand, welcome to ${c.apt || 'the field'}.` },
      { id: 'lineup',    label: 'Line Up & Wait',  status: 'Lining Up', pos: ['Tower'],            rwy: 'dep', build: (cs, s, c) => `${cs}, runway ${c.depRwy || 'in use'}, line up and wait.` },
      { id: 'takeoff',   label: 'Cleared Takeoff', status: 'Departing', pos: ['Tower'],            rwy: 'dep', build: (cs, s, c) => `${cs}, runway ${c.depRwy || 'in use'}, wind ${c.wind || 'calm'}, cleared for takeoff.` },
      { id: 'land',      label: 'Cleared to Land', status: 'Landing',   pos: ['Tower'],            rwy: 'arr', build: (cs, s, c) => `${cs}, runway ${c.arrRwy || 'in use'}, wind ${c.wind || 'calm'}, cleared to land.` },
      { id: 'twrHand',   label: 'Handoff → TWR',   status: 'Inbound',   pos: ['Center'],           rwy: null,  build: (cs, s, c) => `${cs}, contact Tower.` },
      { id: 'ctrHand',   label: 'Handoff → CTR',   status: 'Departed',  pos: ['Tower'],            rwy: null,  build: (cs, s, c) => `${cs}, contact Center, good day.` },
      { id: 'climb',     label: 'Climb / On Course', status: 'Climbing', pos: ['Center'],          rwy: null,  build: (cs, s, c) => `${cs}, radar contact, climb flight level as filed, proceed on course.` },
      { id: 'descend',   label: 'Descend / Arrival', status: 'Inbound', pos: ['Center'],           rwy: 'arr', build: (cs, s, c) => `${cs}, descend via the arrival, expect runway ${c.arrRwy || 'in use'}.` },
      { id: 'approach',  label: 'Cleared Approach', status: 'Approach', pos: ['Center'],           rwy: 'arr', build: (cs, s, c) => `${cs}, cleared ILS approach runway ${c.arrRwy || 'in use'}.` },
      { id: 'goaround',  label: 'Go Around',       status: 'Go Around', pos: ['Tower', 'Center'],  rwy: null,  build: (cs, s, c) => `${cs}, go around, fly runway heading, climb 3000 feet.` },
    ];

    function rwysFor(instrId) {
      const instr = INSTRUCTIONS.find(i => i.id === instrId);
      if (!instr || !instr.rwy) return [];
      const c = getCfg();
      return (instr.rwy === 'dep' ? c.depRwy : c.arrRwy).split(/\s+/).filter(Boolean);
    }

    const DONE_STATUSES = new Set(['Departed', 'Arrived', 'Handed Off']);

    // ATC24 frequencies (MHz). CTR keyed by both main ICAO and center-sector code.
    const FREQ = {
      'IRFD CTR':'124.850','IRCC CTR':'124.850','IRFD TWR':'118.100','IRFD GND':'120.400',
      'IMLR TWR':'133.850','IGAR TWR':'125.600','IBLT TWR':'120.250','ITRC TWR':'119.150',
      'CYPRUS CTR':'126.300','ICCC CTR':'126.300','ILAR TWR':'121.200','ILAR GND':'119.400',
      'IPAP TWR':'119.900','IIAB TWR':'127.250','IHEN TWR':'130.250','IBAR TWR':'118.750',
      'IZOL CTR':'125.650','IZCC CTR':'125.650','IZOL TWR':'118.700','IZOL GND':'121.900',
      'IJAF TWR':'119.100','ISCM TWR':'121.300',
      'ORENJI CTR':'132.300','IOCC CTR':'132.300','ITKO TWR':'118.800','ITKO GND':'118.225',
      'IDCS TWR':'118.250','IBRD TWR':'118.350',
      'PERTH CTR':'135.250','IPCC CTR':'135.250','IPPH TWR':'127.400','IPPH GND':'121.700','ILKL TWR':'120.150',
      'IBTH CTR':'128.600','IBCC CTR':'128.600','IBTH TWR':'118.700','ISKP TWR':'123.250',
      'GRINDAVIK CTR':'126.750','IGCC CTR':'126.750','IKFL TWR':'118.300','IKFL GND':'121.750','ITEY TWR':'119.425',
      'SAUTH CTR':'127.825','ISCC CTR':'127.825','ISAU TWR':'118.200',
    };
    function freqFor(airport, position) {
      return FREQ[`${(airport||'').toUpperCase()} ${(position||'').toUpperCase()}`] || null;
    }

    let strips = [];
    try { strips = JSON.parse(localStorage.getItem('atc-strips') || '[]'); } catch {}
    let log = [];
    try { log = JSON.parse(localStorage.getItem('atc-log') || '[]'); } catch {}

    const cfgEls = {
      pos:    document.getElementById('cfg-pos'),
      apt:    document.getElementById('cfg-apt'),
      depRwy: document.getElementById('cfg-deprwy'),
      arrRwy: document.getElementById('cfg-arrrwy'),
      wind:   document.getElementById('cfg-wind'),
      qnh:    document.getElementById('cfg-qnh'),
      atis:   document.getElementById('cfg-atis'),
    };

    function loadCfg() {
      let c = {};
      try { c = JSON.parse(localStorage.getItem('atc-cfg') || '{}'); } catch {}
      cfgEls.pos.value    = ['Ground', 'Tower', 'Center'].includes(c.pos) ? c.pos : 'Tower';
      cfgEls.apt.value    = c.apt    || '';
      cfgEls.depRwy.value = c.depRwy || '';
      cfgEls.arrRwy.value = c.arrRwy || '';
      cfgEls.wind.value   = c.wind   || '';
      cfgEls.qnh.value    = c.qnh    || '';
      cfgEls.atis.value   = c.atis   || '';
    }
    function getCfg() {
      return {
        pos: cfgEls.pos.value, apt: cfgEls.apt.value.trim().toUpperCase(),
        depRwy: cfgEls.depRwy.value.trim().toUpperCase(),
        arrRwy: cfgEls.arrRwy.value.trim().toUpperCase(),
        wind: cfgEls.wind.value.trim(),
        qnh: cfgEls.qnh.value.trim(), atis: cfgEls.atis.value.trim().toUpperCase(),
      };
    }
    function saveCfg() { localStorage.setItem('atc-cfg', JSON.stringify(getCfg())); }
    function updateCfgFreq() {
      const c = getCfg();
      const f = freqFor(c.apt, c.pos);
      document.getElementById('cfg-freq').textContent = f ? `📻 ${f}` : '';
    }
    Object.values(cfgEls).forEach(el => el.addEventListener('input', () => { saveCfg(); updateCfgFreq(); }));
    cfgEls.pos.addEventListener('change', () => { renderStrips(); updateCfgFreq(); });

    function saveStrips() { localStorage.setItem('atc-strips', JSON.stringify(strips)); }
    function saveLog()    { localStorage.setItem('atc-log', JSON.stringify(log.slice(-40))); }

    function genSquawk() {
      const reserved = new Set(['7500', '7600', '7700', '7000', '1200', '0000']);
      let c;
      do { c = ''; for (let i = 0; i < 4; i++) c += Math.floor(Math.random() * 8); }
      while (reserved.has(c) || strips.some(s => s.squawk === c));
      return c;
    }

    function addLog(text, isAtis) {
      const now = new Date();
      const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      log.push({ t, text, atis: !!isAtis });
      saveLog();
      renderLog();
    }

    function renderLog() {
      const body = document.getElementById('log-body');
      if (!log.length) { body.innerHTML = '<div class="log-empty">Instructions you issue will appear here.</div>'; return; }
      body.innerHTML = log.slice(-20).map(l =>
        `<div class="log-line ${l.atis ? 'atis' : ''}"><span class="lt">${l.t}</span>${escapeHtml(l.text)}</div>`
      ).join('');
      body.scrollTop = body.scrollHeight;
    }

    function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[c])); }

    function renderStrips() {
      const wrap = document.getElementById('strips');
      const empty = document.getElementById('strips-empty');
      wrap.querySelectorAll('.strip').forEach(n => n.remove());
      if (!strips.length) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      strips.forEach((s, idx) => {
        const div = document.createElement('div');
        div.className = 'strip';
        const badgeClass = DONE_STATUSES.has(s.status) ? 'done' : (s.status === 'New' ? '' : 'active');
        const pos = cfgEls.pos.value;
        const avail = INSTRUCTIONS.filter(i => i.pos.includes(pos));
        const opts = avail.length
          ? avail.map(i => `<option value="${i.id}">${i.label}</option>`).join('')
          : '<option value="">— no actions for this position —</option>';
        div.innerHTML = `
          <div class="strip-top">
            <div><span class="strip-cs">${escapeHtml(s.cs)}</span><span class="strip-type">${escapeHtml(s.type || '')}</span></div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="strip-badge ${badgeClass}">${escapeHtml(s.status)}</span>
              <button class="strip-rm" title="Remove">✕</button>
            </div>
          </div>
          <div class="strip-meta">${escapeHtml(s.dep || '???')} → ${escapeHtml(s.arr || '???')} · <span class="strip-sq">SQ ${s.squawk}</span></div>
          <div class="strip-actions">
            <select class="strip-instr">${opts}</select>
            <select class="strip-rwy" style="display:none"></select>
            <button class="strip-tx">▶ Transmit</button>
          </div>`;
        const instrSel = div.querySelector('.strip-instr');
        const rwySel   = div.querySelector('.strip-rwy');
        function refreshRwy() {
          const rwys = rwysFor(instrSel.value);
          if (rwys.length >= 2) {           // only ask which runway when there's a choice
            rwySel.innerHTML = rwys.map(r => `<option value="${r}">RWY ${r}</option>`).join('');
            rwySel.style.display = '';
          } else {
            rwySel.innerHTML = '';
            rwySel.style.display = 'none';
          }
        }
        instrSel.addEventListener('change', refreshRwy);
        refreshRwy();
        div.querySelector('.strip-tx').addEventListener('click', () => transmit(idx, instrSel.value, rwySel.value));
        div.querySelector('.strip-rm').addEventListener('click', () => { strips.splice(idx, 1); saveStrips(); renderStrips(); });
        wrap.appendChild(div);
      });
    }

    function transmit(idx, instrId, chosenRwy) {
      const s = strips[idx];
      const instr = INSTRUCTIONS.find(i => i.id === instrId);
      if (!s || !instr) return;
      const cfg = getCfg();
      if (chosenRwy && instr.rwy === 'dep') cfg.depRwy = chosenRwy;
      if (chosenRwy && instr.rwy === 'arr') cfg.arrRwy = chosenRwy;
      const text = instr.build(s.cs, s, cfg);
      s.status = instr.status;
      saveStrips();
      renderStrips();
      addLog(text, false);
      copyToClipboard(text);
    }

    function copyToClipboard(text) {
      if (navigator.clipboard?.writeText) navigator.clipboard.writeText(text).catch(() => {});
    }

    // Add strip
    document.getElementById('add-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const cs = document.getElementById('add-cs').value.trim().toUpperCase();
      if (!cs) return;
      strips.push({
        cs,
        type: document.getElementById('add-type').value.trim().toUpperCase(),
        dep:  document.getElementById('add-dep').value.trim().toUpperCase(),
        arr:  document.getElementById('add-arr').value.trim().toUpperCase(),
        squawk: genSquawk(),
        status: 'New',
      });
      saveStrips();
      renderStrips();
      e.target.reset();
      document.getElementById('add-cs').focus();
    });

    // ATIS broadcast
    document.getElementById('atis-btn').addEventListener('click', () => {
      const c = getCfg();
      const text = `${c.apt || 'Field'} information ${c.atis || 'A'}, departure runway ${c.depRwy || 'in use'}, arrival runway ${c.arrRwy || 'in use'}, wind ${c.wind || 'calm'}, QNH ${c.qnh || 'standard'}.`;
      addLog(text, true);
      copyToClipboard(text);
    });

    document.getElementById('log-clear').addEventListener('click', () => { log = []; saveLog(); renderLog(); });

    document.getElementById('min-btn').addEventListener('click', () => window.atcAPI?.minimizeAtc());
    document.getElementById('close-btn').addEventListener('click', () => window.close());

    // ── Rail / view switching (Station + Weather are in-window views) ─────────
    let wxLoaded = false;
    document.querySelectorAll('.rail-btn[data-view]').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = btn.dataset.view;
        document.querySelectorAll('.rail-btn[data-view]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.view').forEach(p => p.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        if (v === 'weather' && !wxLoaded) loadWx();
        if (v === 'online'  && !onLoaded) loadOnline();
      });
    });

    // Scope opens as its own window so it stays active alongside the station
    document.getElementById('rail-scope').addEventListener('click', () => window.atcAPI?.toggleScope());

    // ── Live ATIS / weather (from ATC24 data service) ────────────────────────
    const wxList = document.getElementById('wx-list');

    function parseAtis(content) {
      const wind = (content.match(/(\d{3}\/\d{1,2})/) || [])[1] || '';
      const qnh  = (content.match(/Q(\d{3,4})/) || [])[1] || '';
      const dep  = ((content.match(/DEP RWY ([0-9LRC ]+?)\s+ARR/) || [])[1] || '').trim();
      const arr  = ((content.match(/ARR RWY ([0-9LRC ]+)/) || [])[1] || '').trim();
      return { wind, qnh, dep, arr };
    }

    function wxFilterApply() {
      const q = document.getElementById('wx-filter').value.trim().toUpperCase();
      wxList.querySelectorAll('.wx-card').forEach(c => {
        c.style.display = (!q || c.dataset.apt.includes(q)) ? '' : 'none';
      });
    }

    async function loadWx() {
      wxList.innerHTML = '<div class="wx-empty">Loading live ATIS…</div>';
      let data;
      try { data = await window.atcAPI?.fetchAtis(); } catch { data = null; }
      if (!Array.isArray(data)) {
        wxList.innerHTML = '<div class="wx-empty">Couldn\'t reach the ATC24 data service.<br>Check your connection and refresh.</div>';
        return;
      }
      wxLoaded = true;
      data.sort((a, b) => a.airport.localeCompare(b.airport));
      wxList.innerHTML = data.map(a => {
        const p = parseAtis(a.content || '');
        return `<div class="wx-card" data-apt="${a.airport}" data-dep="${p.dep}" data-arr="${p.arr}" data-wind="${p.wind}" data-qnh="${p.qnh}" data-atis="${a.letter}">
          <div class="wx-top"><span class="wx-icao">${escapeHtml(a.airport)}</span><span class="wx-info">INFO ${escapeHtml(a.letter || '?')}</span></div>
          <div class="wx-meta">🌬 ${p.wind || '—'} · QNH ${p.qnh || '—'} · DEP ${p.dep || '—'} · ARR ${p.arr || '—'}</div>
          <button class="wx-use">→ Load into Station</button>
        </div>`;
      }).join('');
      wxList.querySelectorAll('.wx-card').forEach(card => {
        card.querySelector('.wx-use').addEventListener('click', () => {
          cfgEls.apt.value    = card.dataset.apt;
          cfgEls.depRwy.value = card.dataset.dep;
          cfgEls.arrRwy.value = card.dataset.arr;
          cfgEls.wind.value   = card.dataset.wind;
          cfgEls.qnh.value    = card.dataset.qnh;
          cfgEls.atis.value   = card.dataset.atis;
          saveCfg();
          document.querySelector('.rail-btn[data-view="station"]').click();
        });
      });
      document.getElementById('wx-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
      wxFilterApply();
    }

    document.getElementById('wx-refresh').addEventListener('click', loadWx);
    document.getElementById('wx-filter').addEventListener('input', wxFilterApply);

    // ── Online ATC (live staffed positions) ──────────────────────────────────
    let onLoaded = false;
    const onList = document.getElementById('on-list');
    const POS_ORDER = { CTR: 0, APP: 1, DEP: 2, TWR: 3, GND: 4, DEL: 5 };

    function onFilterApply() {
      const q = document.getElementById('on-filter').value.trim().toUpperCase();
      onList.querySelectorAll('.on-card').forEach(c => {
        c.style.display = (!q || c.dataset.apt.includes(q)) ? '' : 'none';
      });
    }

    async function loadOnline() {
      onList.innerHTML = '<div class="wx-empty">Loading active positions…</div>';
      let data;
      try { data = await window.atcAPI?.fetchControllers(); } catch { data = null; }
      if (!Array.isArray(data)) {
        onList.innerHTML = '<div class="wx-empty">Couldn\'t reach the ATC24 data service.<br>Check your connection and refresh.</div>';
        return;
      }
      onLoaded = true;
      const staffed = data.filter(c => c.holder)
        .sort((a, b) =>
          (POS_ORDER[a.position] ?? 9) - (POS_ORDER[b.position] ?? 9) ||
          a.airport.localeCompare(b.airport));
      if (!staffed.length) {
        onList.innerHTML = '<div class="wx-empty">No active controllers online right now.</div>';
      } else {
        onList.innerHTML =
          `<div class="on-group">${staffed.length} position${staffed.length > 1 ? 's' : ''} online</div>` +
          staffed.map(c => {
            const q = c.queue && c.queue.length ? `${c.queue.length} in queue` : '';
            const f = freqFor(c.airport, c.position);
            return `<div class="on-card" data-apt="${c.airport}">
              <span class="on-pos ${c.position}">${c.position}</span>
              <span class="on-apt">${c.airport}</span>
              <span class="on-freq">${f || '—'}</span>
              <span class="on-who">${escapeHtml(c.holder)}</span>
              <span class="on-q">${q}</span>
            </div>`;
          }).join('');
      }
      document.getElementById('on-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
      onFilterApply();
    }

    document.getElementById('on-refresh').addEventListener('click', loadOnline);
    document.getElementById('on-filter').addEventListener('input', onFilterApply);

    loadCfg();
    updateCfgFreq();
    renderStrips();
    renderLog();
  </script>
</body>
</html>
